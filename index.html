<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Simple Counter</title>
        <link rel="stylesheet" href="styles.css">
    </head>

    <body>
        <h1>Simple Counter</h1>

        <div class="Counter">
            <p id="count">0</p>
        </div>

        <div class="Edit-Counter">
            <button id="increase-btn">Increase</button>
            <button id="decrease-btn">Decrease</button>
            <button id="incr10-btn">+10</button>
            <button id="decr10-btn">-10</button>
            <button id="incr50-btn">+50</button>
            <button id="decr50-btn">-50</button>
            <button id="incr100-btn">+100</button>
            <button id="decr100-btn">-100</button>
        </div>

        <form>
            <input type="number" id="number" placeholder="Custom Number"><br>
            <input type="button" id="custom-btn" value="Add To Counter">
        </form>

        <button class ='reset-btn' id="reset-btn">Reset</button>
    </body>

    <script src="script.js"></script>
</html>
